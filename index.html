<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>0DTE Trade Plan</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background: #f5f5f5;
        }
        #container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        textarea {
            width: 100%;
            height: 300px;
            font-size: 14px;
            padding: 10px;
        }
    </style>
</head>
<body>

<div id="container">
    <h2>0DTE Trade Plan</h2>
    <textarea id="planBox"></textarea>
</div>

<script>
    async function loadTradePlan() {
        const url = "https://raw.githubusercontent.com/unconventionaltraders/0dtetradeplan/main/plan.json";

        try {
            const response = await fetch(url);
            if (!response.ok) {
                throw new Error("Failed to fetch trade plan");
            }

            const data = await response.json();
            document.getElementById("planBox").value = JSON.stringify(data, null, 2);

        } catch (error) {
            document.getElementById("planBox").value = "Error loading trade plan: " + error;
        }
    }

    // Auto-load on page open
    loadTradePlan();
</script>

</body>
</html>
